<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="brand">TradingLab Launcher</div>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="/data">Data</a>
        <a href="/strategies">Strategies</a>
        <a href="/create-strategy-guided">Create Strategy (Guided)</a>
        <a href="/create-strategy-english">Create Strategy (English)</a>
        <a href="/backtest">Backtest</a>
        <a href="/runs">Runs</a>
        <a href="/help">Help</a>
        <button id="themeToggle" class="theme-toggle" type="button" title="Toggle theme">Theme</button>
      </nav>
    </div>
  </header>

  <main class="container">
    {% if error %}
      <div class="card card-error">{{ error }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <script>
    // Expose guided-v2 debug configuration to client-side scripts. These are
    // set from server-side state and controlled via config/defaults.yml or
    // environment variables.
    (function(){
      try {
        window.__GUIDED_V2_DEBUG = {{ 'true' if request.app.state.guided_v2_debug else 'false' }};
      } catch (e) {
        window.__GUIDED_V2_DEBUG = false;
      }
      try {
        window.__GUIDED_V2_DEBUG_LOG_DIR = "{{ request.app.state.guided_v2_debug_log_dir }}";
      } catch (e) {
        window.__GUIDED_V2_DEBUG_LOG_DIR = "/tmp/guided_capture";
      }
    })();
  </script>
  <script src="/static/js/theme.js"></script>
</body>
</html>
